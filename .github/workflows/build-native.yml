name: Build Native Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Botón manual en Actions

jobs:
  build-native:
    name: Build OdooInmobiliaria.exe
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
        
    - name: Install build dependencies
      run: |
        pip install pyinstaller pillow pywebview[webview2] psycopg2-binary --quiet
        pip install -e . --quiet
        
    - name: Build native executable
      run: python native_app/build_native.py
      
    - name: Verify EXE created
      run: |
        $exe = "dist_native/OdooInmobiliaria.exe"
        if (Test-Path $exe) {
          $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "✅ EXE creado: $exe ($size MB)"
        } else {
          Write-Host "❌ EXE NO encontrado"
          exit 1
        }
      
    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      with:
        name: OdooInmobiliaria-Windows
        path: dist_native/OdooInmobiliaria.exe
        retention-days: 30
        
    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist_native/OdooInmobiliaria.exe
        generate_release_notes: true
