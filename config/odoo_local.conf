[options]
; ============================================================
; Odoo Inmobiliaria - Configuración 100% LOCAL OFFLINE
; ============================================================

; Rutas (se resuelven dinámicamente en launcher)
addons_path = %APPDATA%\OdooInmobiliaria\addons,%ODOO_DIR%\addons
data_dir = %APPDATA%\OdooInmobiliaria\data\odoo

; Base de datos LOCAL (PostgreSQL portable puerto 5433)
db_host = localhost
db_port = 5433
db_user = odoo
db_password = odoo
db_name = inmobiliaria
db_maxconn = 64

; Modo desarrollo
dev_mode = reload,qweb,werkzeug,xml

; Logging
log_level = info
logfile = %APPDATA%\OdooInmobiliaria\logs\odoo.log
log_handler = :INFO
log_db = False
log_db_level = warning

; Rendimiento local (workers=0 = modo desarrollo síncrono)
workers = 0
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
max_cron_threads = 1

; Seguridad
admin_passwd = admin123
without_demo = False
unaccent = True
translate_modules = all

; HTTP
http_port = 8069
longpolling_port = 8072
proxy_mode = False

; ============================================================
; NOTAS:
; - Todas las rutas usan variables de entorno que resuelve el launcher
; - Puerto 5433 para evitar conflicto con PostgreSQL del sistema (5432)
; - workers=0 permite hot-reload automático al cambiar .py
; - Datos persisten en %APPDATA%\OdooInmobiliaria\
; ============================================================